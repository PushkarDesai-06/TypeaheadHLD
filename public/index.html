<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Distributed Typeahead</title>
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --panel-hi: #1f2630;
        --border: #2b3441;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #4493f8;
        --accent-soft: rgba(68, 147, 248, 0.15);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(1200px 600px at 50% -10%, #15233b 0%, var(--bg) 55%);
        color: var(--text);
        font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        justify-content: center;
      }
      main {
        width: 100%;
        max-width: 640px;
        padding: 72px 20px 48px;
      }
      header h1 {
        margin: 0 0 4px;
        font-size: 28px;
        letter-spacing: -0.02em;
      }
      header p {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 14px;
      }
      .search {
        position: relative;
      }
      #q {
        width: 100%;
        padding: 16px 18px;
        font-size: 18px;
        color: var(--text);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      #q:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-soft);
      }
      #suggestions {
        list-style: none;
        margin: 8px 0 0;
        padding: 6px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
      }
      #suggestions:empty { display: none; }
      #suggestions li {
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #suggestions li:hover,
      #suggestions li[aria-selected="true"] {
        background: var(--panel-hi);
      }
      #suggestions li .ico { color: var(--muted); font-size: 13px; }
      #suggestions li mark { background: none; color: var(--accent); font-weight: 600; }
      .meta {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
        min-height: 16px;
      }
      .trending {
        margin-top: 44px;
      }
      .trending h2 {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin: 0 0 14px;
      }
      .trending ol {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 8px;
      }
      .trending li {
        display: flex;
        align-items: baseline;
        gap: 12px;
        padding: 10px 14px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        cursor: pointer;
      }
      .trending li:hover { border-color: var(--accent); }
      .trending .rank { color: var(--accent); font-weight: 700; width: 22px; }
      .trending .score { margin-left: auto; color: var(--muted); font-size: 13px; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Distributed Typeahead</h1>
        <p>Sharded autocomplete over 3 Redis nodes via a consistent-hash load balancer.</p>
      </header>

      <div class="search">
        <input
          id="q"
          type="text"
          placeholder="Search the web…"
          autocomplete="off"
          spellcheck="false"
          aria-label="Search"
        />
        <ul id="suggestions" role="listbox"></ul>
        <div class="meta" id="meta"></div>
      </div>

      <section class="trending">
        <h2>Trending right now</h2>
        <ol id="trending"></ol>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
